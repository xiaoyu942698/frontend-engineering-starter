name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - 'feat/**'
      - 'fix/**'
      - 'release/**'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Verify
        run: pnpm verify
